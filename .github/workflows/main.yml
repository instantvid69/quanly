name: quanly

on:
  push:
    branches: 
      - main
  workflow_dispatch:

env:
  BUILD_NUMBER: 1
  BUILD_VERSION: 1.0.0
  PYTHON_VERSION: 3.12.2
  PYTHONUTF8: "1"

jobs:
  build:
    runs-on: windows-latest

    steps:
    # SỬA TẠI ĐÂY: Ép GitHub Actions tải code vào thư mục tên là 'quanly' sạch sẽ, không chứa dấu gạch ngang
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        path: quanly

    - name: Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    # Chạy các bước cài đặt bên trong thư mục quanly
    - name: Install Python Dependencies
      working-directory: ./quanly
      run: |
        python -m pip install --upgrade pip
        pip install flet==0.28.3
        pip install -r requirements.txt

    # Lệnh build gốc của Flet 0.28.3 (Bỏ --name vì bản cũ không hỗ trợ)
    - name: Flet Build Windows
      working-directory: ./quanly
      run: |
        flet build windows --verbose --build-number=${{ env.BUILD_NUMBER }} --build-version=${{ env.BUILD_VERSION }}

    # Nén file từ thư mục build ra ngoài thư mục gốc
    - name: Zip Windows Build
      working-directory: ./quanly
      shell: python
      run: |
        import shutil
        import os
        if os.path.exists('build/windows'):
            shutil.make_archive('../quanly-windows', 'zip', 'build/windows')
        else:
            print("Error: Thư mục build/windows không tồn tại!")
            exit(1)

    # Upload file zip lên Artifact
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-build-zip
        path: quanly-windows.zip
        if-no-files-found: error
        overwrite: true

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build-zip

      - name: Release
        uses: jasondavis303/tag-and-release-and-upload@v1.2.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: v${{ env.BUILD_VERSION }}
          assets: '[ "quanly-windows.zip" ]'
          overwrite: false
