name: quanly

on:
  push:
    branches: 
      - main
  workflow_dispatch:

env:
  BUILD_NUMBER: 1
  BUILD_VERSION: 1.0.0
  PYTHON_VERSION: 3.12.2
  FLUTTER_VERSION: 3.41.7 # Sửa từ 3.24.0 thành 3.41.7 để khớp với Flet
  PYTHONUTF8: "1"

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}

    - name: Flet Build Windows
      run: |
        flutter config --no-analytics
        flet build windows --verbose --build-number=$env:BUILD_NUMBER --build-version=$env:BUILD_VERSION

    # ĐÃ SỬA: Thay thế PowerShell bằng Python để nén file chuẩn cross-platform (không bị lỗi dấu \)
    - name: Zip Windows Build
      shell: python
      run: |
        import shutil
        shutil.make_archive('quanly-windows', 'zip', 'build/windows')

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-build-zip
        path: quanly-windows.zip
        if-no-files-found: error
        overwrite: true

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build-zip

      - name: Release
        uses: jasondavis303/tag-and-release-and-upload@v1.2.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: v${{ env.BUILD_VERSION }}
          assets: '[ "quanly-windows.zip" ]'
          overwrite: false
