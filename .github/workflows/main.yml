name: quanly

on:
  push:
    branches: 
      - main
  workflow_dispatch:

env:
  BUILD_NUMBER: 1
  BUILD_VERSION: 1.0.0
  PYTHON_VERSION: 3.12.2
  PYTHONUTF8: "1"

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        path: quanly

    - name: Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Python Dependencies
      working-directory: ./quanly
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller flet==0.28.3
        pip install -r requirements.txt

    # THAY ĐỔI: Sử dụng "python -m PyInstaller" để ép buộc sử dụng đúng môi trường python chứa flet
    - name: PyInstaller Build Windows
      working-directory: ./quanly
      run: |
        python -m PyInstaller --noconfirm --onedir --windowed --name "Quanly" --clean main.py

    - name: Zip Windows Build
      working-directory: ./quanly
      shell: python
      run: |
        import shutil
        import os
        if os.path.exists('dist/Quanly'):
            shutil.make_archive('../quanly-windows', 'zip', 'dist/Quanly')
        else:
            print("Error: Thư mục dist/Quanly không tồn tại!")
            exit(1)

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-build-zip
        path: quanly-windows.zip
        if-no-files-found: error
        overwrite: true

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      # THAY ĐỔI: Thêm "path: ." vì download-artifact v4 mặc định sẽ tạo một thư mục con trùng tên với artifact
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build-zip
          path: .

      - name: Release
        uses: instantvid69/quanly/tag-and-release-and-upload@v1.2.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: v${{ env.BUILD_VERSION }}
          assets: '[ "quanly-windows.zip" ]'
          overwrite: false
