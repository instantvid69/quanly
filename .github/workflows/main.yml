name: quanly

on:
  push:
    branches: 
      - main
  workflow_dispatch:

env:
  BUILD_NUMBER: 1
  BUILD_VERSION: 1.0.0
  PYTHON_VERSION: 3.12.2
  PYTHONUTF8: "1"

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        path: quanly

    - name: Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    # SỬA ĐỔI 1: Ép buộc dùng "python -m pip" cho tất cả các gói để cài đúng vào Python 3.12.2
    - name: Install Python Dependencies
      working-directory: ./quanly
      run: |
        python -m pip install --upgrade pip
        python -m pip install pyinstaller flet==0.28.3
        python -m pip install -r requirements.txt

    # SỬA ĐỔI 2: Dùng "flet pack" thay vì pyinstaller thô để tự động thu thập Flutter Engine
    - name: Flet Pack Build Windows
      working-directory: ./quanly
      run: |
        python -m flet pack --name "Quanly" main.py

    - name: Zip Windows Build
      working-directory: ./quanly
      shell: python
      run: |
        import shutil
        import os
        # flet pack vẫn sinh ra sản phẩm trong thư mục dist/Quanly giống PyInstaller
        if os.path.exists('dist/Quanly'):
            shutil.make_archive('../quanly-windows', 'zip', 'dist/Quanly')
        else:
            print("Error: Thư mục dist/Quanly không tồn tại!")
            exit(1)

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-build-zip
        path: quanly-windows.zip
        if-no-files-found: error
        overwrite: true

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build-zip
          path: .

      - name: Release
        uses: instantvid69/quanly/tag-and-release-and-upload@v1.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: v${{ env.BUILD_VERSION }}
          assets: '[ "quanly-windows.zip" ]'
          overwrite: false
